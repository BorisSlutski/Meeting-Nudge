<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';">
  <title>Meeting Prep</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="icon">📅</span>
      <span class="badge" id="time-badge">Meeting soon</span>
      <button class="close-btn" id="got-it-btn" title="Got it">✕</button>
    </div>

    <h2 class="meeting-title" id="meeting-title">Meeting Title</h2>

    <div class="meeting-meta" id="meeting-time"></div>
    <div class="meeting-meta location" id="meeting-location" style="display: none;"></div>

    <div class="actions">
      <div id="join-buttons"></div>
      <button class="btn-secondary" id="dismiss-btn">Got it</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
